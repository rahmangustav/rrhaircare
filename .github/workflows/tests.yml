# Menjalankan test unit di tests/ otomatis tiap push/PR ke main.
# Sebelumnya repo ini tidak punya CI sama sekali, jadi 140 test yang sudah
# ditulis (tests/*.test.js) tidak pernah benar-benar dijalankan otomatis —
# regresi baru bisa lolos merge tanpa ketahuan.

name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Jalankan test unit
      run: npm test
